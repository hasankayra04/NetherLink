name: NetherLink
description: "Broadcast a remote server as a local server ."

publish_to: 'none'
version: 4.0.0+22

environment:
  sdk: ^3.8.1
dependencies:
  udp: ^5.0.3
  url_launcher: ^6.3.1
  wakelock_plus: ^1.3.2
  path_provider: ^2.1.5
  http: ^1.4.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  uuid: ^4.5.2
  package_info_plus: ^9.0.0
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.2.4
  mc_server_info: ^1.0.0
  connectivity_plus: ^7.1.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  web_socket_channel: ^2.4.0
  share_plus: 10.1.4
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.13

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/aternos.png
    - assets/images/splash.png
    - assets/images/logo.png
    - assets/images/feature.png
    - assets/images/wiki.png
    - assets/images/skin.png
    - assets/images/tunnel.png
    - assets/images/wiki.png
    - assets/images/skin.png
    - assets/images/tunnel.png

msix_config:
  display_name: NetherLink
  publisher_display_name: Jens Collaert
  identity_name: JensCollaert.NetherLink
  msix_version: 3.5.4.0
  publisher: CN=ED8BFBA1-D05A-4503-813F-9B89DB1BE8A2
  logo_path: windows\runner\resources\app_icon.ico
  store: true