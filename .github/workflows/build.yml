name: Build & Release (dev)

on:
  push:
    branches:
      - '**'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath NetherLink-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: NetherLink-windows.zip

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/NetherLink-macos.zip" NetherLink.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: NetherLink-macos.zip

  release:
    name: Create or Update dev Release
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4.1.3
        with:
          name: android-apk
          path: artifacts/

      - uses: actions/download-artifact@v4.1.3
        with:
          name: windows-zip
          path: artifacts/

      - uses: actions/download-artifact@v4.1.3
        with:
          name: macos-zip
          path: artifacts/

      - name: Rename Android APK
        run: mv artifacts/app-release.apk artifacts/NetherLink-android.apk

      - name: Create or update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          body: |
            Automated development build from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.
          files: |
            artifacts/NetherLink-android.apk
            artifacts/NetherLink-windows.zip
            artifacts/NetherLink-macos.zip
